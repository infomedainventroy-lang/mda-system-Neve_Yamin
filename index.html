<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדף לא נמצא - אופס!</title>
    <style>
        /* הגדרות כלליות */
        :root {
            --primary-color: #004792;
            --secondary-color: #ed1c24;
            --text-color: #333;
            --bg-light: #f4f7f9;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* רקע מונפש */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            background: rgba(0, 71, 146, 0.05);
            border-radius: 50%;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        .blob-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; bottom: -50px; right: -50px; background: rgba(237, 28, 36, 0.05); }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        /* מיכל מרכזי */
        .container {
            text-align: center;
            background: var(--white);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            border-top: 5px solid var(--primary-color);
        }

        /* עיצוב המספר 404 */
        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            top: 5px;
            left: 5px;
            color: rgba(237, 28, 36, 0.2);
            z-index: -1;
        }

        /* איור קטן ב-CSS */
        .icon-box {
            width: 80px;
            height: 80px;
            background: #fdf2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: var(--secondary-color);
        }

        h1 {
            font-size: 28px;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* כפתור */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--primary-color);
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 71, 146, 0.3);
            border: 2px solid transparent;
        }

        .btn:hover {
            background-color: var(--white);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 71, 146, 0.2);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* פוטר קטן */
        .footer-note {
            margin-top: 40px;
            font-size: 14px;
            color: #aaa;
        }

        /* התאמה לנייד */
        @media (max-width: 480px) {
            .error-code { font-size: 80px; }
            h1 { font-size: 22px; }
            p { font-size: 16px; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M12,2L1,21H23M12,6L19.53,19H4.47M11,10V14H13V10M11,16V18H13V16" />
            </svg>
        </div>

        <div class="error-code">404</div>
        
        <h1>הדף שחיפשת כבר לא כאן</h1>
        <p>החלפנו לגירסה חדשה!<br>
        אל דאגה, כל המידע המעודכן מחכה לך באתר החדש שלנו.</p>

        <a href="https://mda-system.vercel.app/" class="btn">מעבר לאתר החדש</a>

        <div class="footer-note">

        </div>
    </div>

    <script>
        // ניתן להוסיף לוגיקה שתשלח את המשתמש אוטומטית אחרי 10 שניות
        /*
        setTimeout(function() {
            window.location.href = "https://www.example.com";
        }, 10000);
        */
        console.log("דף 404 נטען בהצלחה.");
    </script>

</body>
</html>
